<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plantillas de Dispositivos Realistas</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Estilos personalizados para suavizar sombras e interacciones */
        .device-shadow {
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
        .base-shadow {
            box-shadow: inset 0 -3px 4px rgba(0,0,0,0.2), 0 10px 20px rgba(0,0,0,0.4);
        }
        /* Ocultar scrollbars en las pantallas para que parezca una app nativa */
        .hide-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .hide-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
</head>
<body class="bg-gray-100 min-h-screen p-8 text-gray-800 font-sans">

    <div class="max-w-6xl mx-auto space-y-20 pb-20">
        
        <header class="text-center mb-16 pt-8">
            <h1 class="text-4xl font-bold text-gray-900 mb-4">Plantillas para Presentación de Sistemas</h1>
            <p class="text-lg text-gray-600 max-w-2xl mx-auto">Reemplaza las etiquetas <code>&lt;img&gt;</code> dentro de cada dispositivo con capturas de tu sistema, o usa un <code>&lt;iframe&gt;</code> para mostrar tu sistema en vivo.</p>
        </header>

        <!-- SECCIÓN 1: LAPTOP MOCKUP -->
        <section class="flex flex-col items-center">
            <h2 class="text-2xl font-semibold mb-8 text-gray-700">Laptop / MacBook Pro</h2>
            
            <div class="relative mx-auto group cursor-pointer transition-transform duration-500 hover:scale-[1.02]">
                <!-- Pantalla del Laptop -->
                <div class="relative mx-auto border-gray-800 bg-gray-800 border-[8px] rounded-t-xl h-[300px] w-[450px] device-shadow md:h-[450px] md:w-[750px] overflow-hidden">
                    
                    <!-- Cámara Web -->
                    <div class="absolute top-1 left-1/2 -translate-x-1/2 w-2 h-2 rounded-full bg-gray-900 border border-gray-700 z-20"></div>

                    <!-- CONTENIDO DE TU SISTEMA -->
                    <div class="rounded-sm overflow-hidden h-full w-full bg-white relative hide-scrollbar overflow-y-auto">
                        <img src="https://images.unsplash.com/photo-1551288049-bebda4e38f71?q=80&w=2070&auto=format&fit=crop" alt="Dashboard UI" class="w-full h-auto min-h-full object-cover">
                        <!-- Ejemplo Iframe: <iframe src="https://tu-sistema-web.com" class="w-full h-full border-none"></iframe> -->
                    </div>
                </div>

                <!-- Base del Laptop -->
                <div class="relative mx-auto bg-gray-300 rounded-b-xl rounded-t-sm h-[18px] md:h-[22px] max-w-[500px] md:max-w-[850px] base-shadow flex items-start justify-center">
                    <!-- Hendidura para abrir la laptop -->
                    <div class="w-[60px] md:w-[100px] h-[6px] md:h-[8px] bg-gray-400 rounded-b-md shadow-inner"></div>
                </div>
            </div>
        </section>


        <!-- SECCIÓN 2: TABLET MOCKUP -->
        <section class="flex flex-col items-center pt-8">
            <h2 class="text-2xl font-semibold mb-8 text-gray-700">Tablet / iPad Pro</h2>
            
            <!-- Marco de la Tablet -->
            <div class="relative mx-auto border-gray-900 bg-gray-900 border-[16px] rounded-[2rem] h-[500px] w-[360px] md:h-[700px] md:w-[500px] device-shadow transition-transform duration-500 hover:scale-[1.02]">
                
                <!-- Cámara en el borde superior -->
                <div class="absolute -top-2.5 left-1/2 -translate-x-1/2 w-2 h-2 bg-gray-950 rounded-full border border-gray-700 z-20"></div>

                <!-- Botones laterales -->
                <div class="absolute -right-[19px] top-[60px] w-[3px] h-[40px] bg-gray-800 rounded-r-lg"></div>
                <div class="absolute -right-[19px] top-[115px] w-[3px] h-[40px] bg-gray-800 rounded-r-lg"></div>
                <div class="absolute -top-[19px] right-[40px] w-[40px] h-[3px] bg-gray-800 rounded-t-lg"></div>

                <!-- CONTENIDO DE TU SISTEMA -->
                <div class="rounded-[1.2rem] overflow-hidden w-full h-full bg-gray-100 relative hide-scrollbar overflow-y-auto shadow-inner">
                    <img src="https://images.unsplash.com/photo-1542744094-24638eff58bb?q=80&w=2070&auto=format&fit=crop" alt="Tablet UI" class="w-full h-auto min-h-full object-cover">
                    
                    <!-- Indicador de "Home" de iOS abajo -->
                    <div class="absolute bottom-2 left-1/2 -translate-x-1/2 w-1/3 h-1.5 bg-black/40 backdrop-blur-md rounded-full z-20"></div>
                </div>
            </div>
        </section>


        <!-- SECCIÓN 3: SMARTPHONE MOCKUP -->
        <section class="flex flex-col items-center pt-8">
            <h2 class="text-2xl font-semibold mb-8 text-gray-700">Smartphone / iPhone</h2>
            
            <!-- Marco del teléfono -->
            <div class="relative mx-auto border-gray-900 bg-gray-900 border-[14px] rounded-[3rem] h-[650px] w-[320px] device-shadow transition-transform duration-500 hover:scale-[1.02]">
                
                <!-- Botones laterales (Volumen y Encendido) -->
                <div class="absolute -left-[17px] top-[120px] w-[3px] h-[35px] bg-gray-800 rounded-l-lg"></div>
                <div class="absolute -left-[17px] top-[170px] w-[3px] h-[50px] bg-gray-800 rounded-l-lg"></div>
                <div class="absolute -left-[17px] top-[230px] w-[3px] h-[50px] bg-gray-800 rounded-l-lg"></div>
                <div class="absolute -right-[17px] top-[180px] w-[3px] h-[70px] bg-gray-800 rounded-r-lg"></div>

                <!-- Notch / Isla Dinámica de la cámara superior -->
                <div class="w-[120px] h-[25px] bg-gray-900 absolute top-0 left-1/2 -translate-x-1/2 rounded-b-[1.2rem] z-20 flex justify-center items-center gap-2">
                    <div class="w-12 h-1.5 bg-gray-800 rounded-full"></div>
                    <div class="w-3 h-3 bg-gray-800 rounded-full border border-gray-700"></div>
                </div>

                <!-- CONTENIDO DE TU SISTEMA -->
                <div class="rounded-[2.2rem] overflow-hidden w-full h-full bg-white relative hide-scrollbar overflow-y-auto">
                    <!-- Barra de estado superior simulada (Batería, WiFi) -->
                    <div class="absolute top-0 w-full h-8 flex justify-between items-center px-6 pt-1 z-10 text-white drop-shadow-md">
                        <span class="text-xs font-semibold">12:04</span>
                        <div class="flex gap-1 items-center">
                            <svg class="w-3 h-3" fill="currentColor" viewBox="0 0 24 24"><path d="M12 21L15.6 16.2C14.6 15.45 13.35 15 12 15C10.65 15 9.4 15.45 8.4 16.2L12 21ZM12 3C7.95 3 4.2 4.4 1.2 6.8L3.6 10C6 8.2 8.85 7 12 7C15.15 7 18 8.2 20.4 10L22.8 6.8C19.8 4.4 16.05 3 12 3ZM12 9C9.3 9 6.8 9.9 4.8 11.5L7.2 14.7C8.55 13.65 10.2 13 12 13C13.8 13 15.45 13.65 16.8 14.7L19.2 11.5C17.2 9.9 14.7 9 12 9Z"/></svg>
                            <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 24 24"><path d="M15.67 4H14V2H10V4H8.33C7.6 4 7 4.6 7 5.33V20.67C7 21.4 7.6 22 8.33 22H15.67C16.4 22 17 21.4 17 20.67V5.33C17 4.6 16.4 4 15.67 4Z"/></svg>
                        </div>
                    </div>

                    <img src="https://images.unsplash.com/photo-1607252650355-f7fd0460ccdb?q=80&w=1740&auto=format&fit=crop" alt="Mobile App UI" class="w-full h-auto min-h-full object-cover">
                    
                    <!-- Indicador de "Home" de iOS abajo -->
                    <div class="absolute bottom-2 left-1/2 -translate-x-1/2 w-1/3 h-1 bg-white/50 backdrop-blur-md rounded-full z-20"></div>
                </div>
            </div>
        </section>

    </div>

</body>
</html>
